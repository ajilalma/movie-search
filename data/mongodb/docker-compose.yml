services:
  mongodb:
    image: mongodb/mongodb-atlas-local
    container_name: mongodb_local
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db
    networks:
      - mongo_net
    # Note: Search capabilities are enabled by default in the official image
    # but require enough memory allocation.
    deploy:
      resources:
        limits:
          memory: 4G

networks:
  mongo_net:
    driver: bridge

volumes:
  mongo_data:
